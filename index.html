<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<title>Vökuhringur</title>
<style>
  :root {
    --fg: #1c1c1e;
    --fg-muted: #6b6b70;
    --bg: #fbfaf7;
    --panel: #f1efe9;
    --rule: #d9d6cf;
    --chess: #5b8bb0;
    --friend: #d97757;
    --low: #6b6b70;
    --med: #b88500;
    --high: #2f7d3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--fg);
    background: var(--bg);
  }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }
  header { margin-bottom: 16px; }
  h1 { margin: 0 0 2px; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .sub { margin: 0; color: var(--fg-muted); font-size: 13px; }

  .card {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 16px 16px;
    margin-bottom: 14px;
  }
  .card.bordered { border-left-width: 6px; border-left-style: solid; }
  .card.bordered.low    { border-left-color: var(--low); }
  .card.bordered.medium { border-left-color: var(--med); }
  .card.bordered.high   { border-left-color: var(--high); }

  .verdict {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.15;
  }
  .pawake {
    font-size: 13px;
    color: var(--fg-muted);
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .when {
    font-size: 12px;
    color: var(--fg-muted);
    margin-top: 12px;
    font-variant-numeric: tabular-nums;
  }

  .seen {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 14px;
  }
  .seen .label { font-size: 12px; color: var(--fg-muted); }
  .seen .value { font-weight: 500; margin-top: 2px; }
  .seen .value .src { color: var(--fg-muted); font-weight: 400; }

  .mini {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 8px 8px 4px;
    margin-bottom: 14px;
  }
  .mini .label {
    font-size: 12px;
    color: var(--fg-muted);
    padding: 2px 4px 6px;
  }
  .mini .legend {
    font-size: 11px;
    color: var(--fg-muted);
    display: flex;
    gap: 14px;
    padding: 4px 4px 0;
  }
  .mini .legend .swatch {
    display: inline-block;
    width: 8px;
    height: 8px;
    vertical-align: -1px;
    margin-right: 5px;
  }
  .mini .legend .swatch.chess  { background: var(--chess); border-radius: 50%; }
  .mini .legend .swatch.friend { background: var(--friend); transform: rotate(45deg); }

  .qp {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .qp label {
    display: block;
    font-size: 12px;
    color: var(--fg-muted);
    margin-bottom: 6px;
  }
  .qp input[type="datetime-local"] {
    font: inherit;
    padding: 8px;
    width: 100%;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: white;
  }
  .qp .ans {
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.4;
  }
  .qp .ans .v { font-weight: 600; }
  .qp .ans .p { color: var(--fg-muted); font-variant-numeric: tabular-nums; }

  footer {
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--fg-muted);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  footer a { color: var(--fg); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <header>
    <h1>Vökuhringur</h1>
    <p class="sub">Is Edson awake right now?</p>
  </header>

  <div class="card bordered low" id="verdict">
    <div class="verdict">Loading…</div>
  </div>

  <div class="seen" id="seen">
    <div class="label">Last seen</div>
    <div class="value">—</div>
  </div>

  <div class="mini">
    <div class="label">Last 14 days · double-plotted 0–48 h</div>
    <div id="raster14"></div>
  </div>

  <div class="qp">
    <label for="when">Predict for a different time</label>
    <input type="datetime-local" id="when" />
    <div class="ans" id="ans">—</div>
  </div>

  <footer>
    <span>data <span id="datafresh">—</span></span>
    <a href="./details.html">Details →</a>
  </footer>
</main>

<script type="module">
import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.16/+esm";
import { collapseSessions, fitTau, predict } from "./model.js";

const data = await fetch("./observations.json?v=" + Date.now()).then(r => r.json());
const obs = data.observations.map(o => ({ ts: new Date(o.ts), source: o.source }));
const events = collapseSessions(obs);
const nowMs = Date.now();
const { tau } = fitTau(events, nowMs);

// ---------- main verdict for "now" ----------
function renderVerdict(targetMs) {
  const r = predict(events, tau, targetMs);
  const el = document.getElementById("verdict");
  el.className = "card bordered " + r.confidence;

  let verdict, sub;
  if (r.confidence === "low") {
    verdict = "Don't know.";
    sub = `Best guess pAwake ${r.pAwake.toFixed(2)} · low confidence`;
  } else {
    const awake = r.pAwake > 0.5;
    const word = awake ? "awake" : "asleep";
    verdict = (r.confidence === "high" ? "Likely " : "Probably ") + word + ".";
    sub = `pAwake ${r.pAwake.toFixed(2)} · ${r.confidence} confidence`;
  }
  const ts = new Date(targetMs).toISOString().replace("T", " ").slice(0, 16) + " UTC";
  el.innerHTML = `
    <div class="verdict">${verdict}</div>
    <div class="pawake">${sub}</div>
    <div class="when">${ts}</div>
  `;
}
renderVerdict(nowMs);

// ---------- last seen ----------
function humanAgo(ms) {
  if (ms < 0) return "just now";
  const s = Math.round(ms / 1000);
  if (s < 60)         return `${s} s ago`;
  const m = Math.round(s / 60);
  if (m < 60)         return `${m} min ago`;
  const h = Math.round(m / 60);
  if (h < 36)         return `${h} h ago`;
  const d = Math.round(h / 24);
  return `${d} days ago`;
}
const last = obs[obs.length - 1];
const lastTs = last.ts.toISOString().replace("T", " ").slice(0, 16) + " UTC";
document.getElementById("seen").innerHTML = `
  <div class="label">Last seen</div>
  <div class="value">${humanAgo(nowMs - +last.ts)} <span class="src">· ${lastTs}</span></div>
`;

// ---------- mini raster: last 14 days, double-plotted ----------
function utcDateOnly(d) { return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate())); }
function hourOfDay(d)  { return d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600; }

const today = utcDateOnly(new Date());
const start = new Date(today.getTime() - 14 * 86400000);
const end   = new Date(today.getTime() +  1 * 86400000);

const doubled = obs.flatMap(o => {
  const date = utcDateOnly(o.ts);
  const hour = hourOfDay(o.ts);
  const prev = new Date(date.getTime() - 86400000);
  return [
    { date, hour, source: o.source },
    { date: prev, hour: hour + 24, source: o.source },
  ];
}).filter(d => d.date >= start && d.date <= end);

const raster14 = Plot.plot({
  width: 440,
  height: 200,
  marginLeft: 36,
  marginRight: 8,
  marginTop: 8,
  marginBottom: 22,
  x: {
    domain: [0, 48],
    ticks: [0, 12, 24, 36, 48],
    tickFormat: d => `${(d % 24).toString().padStart(2, "0")}h`,
    label: null,
    grid: true,
  },
  y: {
    type: "time",
    reverse: true,
    domain: [start, end],
    label: null,
    tickFormat: "%d %b",
    ticks: 5,
    grid: true,
  },
  marks: [
    Plot.ruleX([24], { stroke: "#bbb", strokeDasharray: "2 4" }),
    Plot.ruleY([today], { stroke: "#c44", strokeDasharray: "2 3", strokeOpacity: 0.6 }),
    Plot.dot(doubled, {
      x: "hour",
      y: "date",
      fill: "#5b8bb0",
      stroke: "#5b8bb0",
      r: 2.4,
      fillOpacity: 0.7,
      strokeOpacity: 0.85,
    }),
  ],
});
document.getElementById("raster14").replaceChildren(raster14);

// ---------- predict for arbitrary time ----------
const whenInput = document.getElementById("when");
const ans = document.getElementById("ans");

function localDatetimeValue(d) {
  const pad = n => n.toString().padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
whenInput.value = localDatetimeValue(new Date());

function runQp() {
  const when = new Date(whenInput.value);
  if (Number.isNaN(when.getTime())) {
    ans.innerHTML = `<span class="v">Invalid date.</span>`;
    return;
  }
  const r = predict(events, tau, +when);
  let v;
  if (r.confidence === "low") {
    v = "Don't know.";
  } else {
    const awake = r.pAwake > 0.5;
    const word = awake ? "awake" : "asleep";
    v = (r.confidence === "high" ? "Likely " : "Probably ") + word + ".";
  }
  ans.innerHTML = `<span class="v">${v}</span> <span class="p">pAwake ${r.pAwake.toFixed(2)} · ${r.confidence}</span>`;
}
whenInput.addEventListener("change", runQp);
whenInput.addEventListener("input", runQp);
runQp();

// ---------- footer freshness ----------
document.getElementById("datafresh").textContent = data.generated_at.replace("T", " ").slice(0, 16) + " UTC";
</script>
</body>
</html>
